site_name: Legislación Educativa de Guatemala
site_description: Recopilación Comprensiva del Marco Legal Educativo
site_author: Tu Nombre

repo_url: https://github.com/tu-usuario/legislacion-educativa-guatemala
repo_name: legislacion-educativa-guatemala

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Flag_of_Guatemala.svg/200px-Flag_of_Guatemala.svg.png
  favicon: https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Flag_of_Guatemala.svg/200px-Flag_of_Guatemala.svg.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tu-usuario/legislacion-educativa-guatemala

nav:
  - Inicio: index.md

extra_css:
  - stylesheets/extra.css
